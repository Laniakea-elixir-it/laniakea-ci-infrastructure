---

- name: Retrieve VPN confile from the jump host
  slurp:
    src: "{{ openvpn_file_path }}"
  register: ovpn_file
  delegate_to: "{{ openvpn_server_host }}"
  run_once: true

- name: Copy ovpn file to destination
  copy:
    dest: "{{ openvpn_file_path }}"
    content: "{{ ovpn_file.content | b64decode }}"
    mode: '0600'
