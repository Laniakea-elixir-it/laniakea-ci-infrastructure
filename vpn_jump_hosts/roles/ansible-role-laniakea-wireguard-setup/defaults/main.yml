---
# WireGuard listen port on the bastion
wireguard_port: 51820

# Directory where WireGuard configs and keys are stored
wireguard_config_dir: "/etc/wireguard"

# Ansible group name containing all dashboard hosts
wireguard_dashboard_group: "laniakea-dashboard"

# Single bastion peer to configure — pass this at playbook level.
# Run the playbook once per bastion.
#
# wireguard_peer:
#   bastion_host: elixir-paas              # inventory hostname of the bastion
#   iface_dashboard: wg_elixir_paas        # WireGuard interface name on the dashboard
#   bastion_private_iface: ens4            # LAN interface on the bastion (for MASQUERADE)
#   wg_subnet: "10.10.0.0/24"             # VPN subnet for this bastion
#   private_network: 172.18.10.0           # tenant private network to route
#   private_prefix: 24                     # CIDR prefix of the tenant network
wireguard_peer: {}

# Per-dashboard WireGuard IPs — define in host_vars of each dashboard.
# Key is the iface_dashboard name, value is the IP (without prefix).
#
# Example in host_vars/laniakea-dashboard-dev/vars.yml:
#   wireguard_wg_ip:
#     wg_elixir_paas: "10.10.0.2"
#     wg_elixir_italy_services: "10.10.1.2"
#
# Example in host_vars/laniakea-dashboard-prod/vars.yml:
#   wireguard_wg_ip:
#     wg_elixir_paas: "10.10.0.3"
#     wg_elixir_italy_services: "10.10.1.3"
wireguard_wg_ip: {}
