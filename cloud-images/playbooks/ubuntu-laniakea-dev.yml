---
- hosts: default
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    - name: Upgrade all packages
      apt:
        upgrade: dist
    - name: Remove unused packages
      apt:
        autoremove: yes
    - name: Clean apt cache
      apt:
        autoclean: yes
